spring.application.name=anganwadi-management

# PostgreSQL Connection for Docker Container
spring.datasource.url=jdbc:postgresql://localhost:5433/anganwadi_db?timezone=Asia/Kolkata
spring.datasource.username=awuser
spring.datasource.password=awpass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.com.anganwadi=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.anganwadi.anganwadi_management.security=DEBUG

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration.ms=86400000