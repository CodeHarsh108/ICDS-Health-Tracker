spring.application.name=anganwadi-management

# PostgreSQL Connection for Docker Container
spring.datasource.url=jdbc:postgresql://localhost:5433/anganwadi_db?timezone=Asia/Kolkata
spring.datasource.username=awuser
spring.datasource.password=awpass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.com.anganwadi=DEBUG

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false