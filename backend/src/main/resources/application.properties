spring.application.name=anganwadi-management
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicit dialect (avoids auto‑detection that requires a working connection)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.com.anganwadi=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.anganwadi.anganwadi_management.security=DEBUG

spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}